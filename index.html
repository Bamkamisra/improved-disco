<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Consonant Drill</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900 font-sans">

<!-- Welcome screen -->
<div id="welcome-screen" class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-[0_0_15px_rgba(0,0,0,0.1)] text-center max-w-sm w-full border border-gray-100">
        <h2 class="text-xl font-bold mb-1">CSII Team X presents</h2>
        <p class="text-gray-600 mb-6 text-sm">Thai Consonants</p>
        
        <input 
            type="text" 
            id="nickname-input" 
            placeholder="nickname"
            class="w-full border border-gray-400 p-2 mb-4 rounded text-sm focus:outline-none focus:border-blue-500">
        
        <button onclick="startQuiz()" 
            class="bg-[#007BFF] text-white px-6 py-2 rounded shadow hover:bg-blue-600 w-32 text-sm font-medium">
            Start Quiz
        </button>
        
        <p id="error-msg" class="text-red-500 text-xs mt-2 hidden">Please enter a nickname.</p>
    </div>
</div>

<!-- Quiz / Drill screen -->
<div id="quiz-screen" class="hidden flex-col items-center justify-start min-h-screen pt-16">
    <div class="max-w-md w-full px-6">
        <p id="user-info" class="text-center font-bold text-2xl"></p>
        <p id="hearts" class="text-center text-4xl my-4">❤️❤️❤️</p>
        <p id="remaining" class="text-center text-lg">Remaining: 36</p>
        
        <h2 class="text-center text-3xl font-bold mt-8 mb-6">Thai Consonant Drill</h2>
        
        <!-- Example drill (you can expand later) -->
        <div id="big-letter" class="text-center text-8xl mb-8">ฌ</div>
        
        <div class="space-y-3">
            <button onclick="checkAnswer('Low')" class="w-full bg-gray-100 hover:bg-gray-200 py-4 rounded text-lg">phor phan — Low</button>
            <button onclick="checkAnswer('High')" class="w-full bg-gray-100 hover:bg-gray-200 py-4 rounded text-lg">hor hip — High</button>
            <button onclick="checkAnswer('Middle')" class="w-full bg-gray-100 hover:bg-gray-200 py-4 rounded text-lg">tor tao — Middle</button>
        </div>
    </div>
</div>

<script>
// A small sample of Thai consonants (you can add the rest later!)
const thaiConsonants = [
    { char: 'ก', class: 'Middle', name: 'gor gai' },
    { char: 'ข', class: 'High', name: 'khor khai' },
    { char: 'ค', class: 'Low', name: 'khor khwai' },
    { char: 'ง', class: 'Low', name: 'ngor ngu' },
    { char: 'จ', class: 'Middle', name: 'jor jan' },
    { char: 'ฉ', class: 'High', name: 'chor ching' },
    { char: 'ฌ', class: 'Low', name: 'chor choe' }
];

let hearts = 3;
let availableQuestions = [];
let currentConsonant = null;
let currentNickname = "";

async function startQuiz() {
    const nickInput = document.getElementById('nickname-input');
    currentNickname = nickInput.value.trim();
    
    if (!currentNickname) {
        document.getElementById('error-msg').classList.remove('hidden');
        return;
    }
    
    try {
        // Tell the backend we are starting
        const response = await fetch('https://improved-disco-service.onrender.com/api/quiz/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nickname: currentNickname })
        });
        
        if (!response.ok) throw new Error("Backend not ready yet");
        const data = await response.json();
        
        // Switch screens and show stats
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('user-info').innerHTML = `${data.nickname} — Starts: ${data.starts}`;
        
        // Setup the game!
        hearts = 3;
        availableQuestions = [...thaiConsonants]; // Copy the array
        updateHeartsDisplay();
        loadNextQuestion();
        
    } catch (err) {
        alert("Backend error: " + err.message);
    }
}

function loadNextQuestion() {
    if (hearts <= 0) {
        alert("Game Over! You ran out of hearts. Refresh to try again!");
        return;
    }
    if (availableQuestions.length === 0) {
        alert("You Win! You conquered the Thai alphabet!");
        return;
    }

    // Pick a random letter
    const randomIndex = Math.floor(Math.random() * availableQuestions.length);
    currentConsonant = availableQuestions[randomIndex];

    // Remove it from the list so we don't get it again
    availableQuestions.splice(randomIndex, 1);

    // Update the screen
    document.getElementById('remaining').innerText = `Remaining: ${availableQuestions.length + 1}`;
    document.getElementById('big-letter').innerText = currentConsonant.char;
}

function checkAnswer(selectedClass) {
    // Check if they clicked the right button
    if (selectedClass === currentConsonant.class) {
        // Correct! Just load the next question
        loadNextQuestion();
    } else {
        // Wrong! Lose a heart
        hearts--;
        updateHeartsDisplay();
        
        if (hearts > 0) {
            alert(`Oops! ${currentConsonant.char} (${currentConsonant.name}) is a ${currentConsonant.class} consonant.`);
            loadNextQuestion();
        } else {
            alert(`Game Over! ${currentConsonant.char} was a ${currentConsonant.class} consonant.`);
        }
    }
}

function updateHeartsDisplay() {
    let heartString = "";
    for(let i=0; i<hearts; i++) { heartString += "❤️"; }
    for(let i=hearts; i<3; i++) { heartString += "🤍"; } // Broken/empty hearts
    document.getElementById('hearts').innerText = heartString;
}
</script>

</body>
</html>
